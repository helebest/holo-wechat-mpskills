name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Validate repository
        run: uv run holo-wechat-validate

      - name: Validate plugin sync
        run: uv run holo-wechat-sync-plugin --check

      - name: Prepare test temp directory
        run: mkdir -p .tmp

      - name: Run tests
        run: uv run python -m pytest --basetemp .tmp/pytest -p no:cacheprovider
